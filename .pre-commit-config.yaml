repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        # ponytail: pass_filenames=false so mypy sees the full app package,
        # not isolated files (avoids false "module not found" errors on imports)
        pass_filenames: false
        args: [app]
